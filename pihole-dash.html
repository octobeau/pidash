                        <body>
                            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-hole Multi-Dashboard</title>
    <style>
        :root { --bg-primary:#0f1923;--bg-secondary:#1a2a3a;--bg-card:#1e3044;--accent-green:#3ddc84;--accent-blue:#1e90ff;--accent-red:#ff4757;--accent-orange:#ffa502;--accent-purple:#a855f7;--accent-cyan:#00d2d3;--text-primary:#e8e8e8;--text-secondary:#8899aa;--text-muted:#556677;--border-color:#2a4a5a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; }
        .header { background:linear-gradient(135deg,#1a2a3a,#0f1923); border-bottom:2px solid var(--border-color); padding:16px 32px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
        .header-left { display:flex; align-items:center; gap:16px; }
        .logo { width:42px; height:42px; background:linear-gradient(135deg,var(--accent-green),var(--accent-blue)); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:bold; }
        .header h1 { font-size:1.5rem; font-weight:700; background:linear-gradient(90deg,var(--accent-green),var(--accent-blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .header h1 span { font-weight:300; opacity:0.7; }
        .header-controls { display:flex; align-items:center; gap:12px; }
        .refresh-timer { font-size:0.8rem; color:var(--text-muted); display:flex; align-items:center; gap:6px; }
        .refresh-timer .dot { width:8px; height:8px; border-radius:50%; background:var(--accent-green); animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        button { background:var(--bg-card); color:var(--text-primary); border:1px solid var(--border-color); padding:8px 16px; border-radius:8px; cursor:pointer; font-size:0.85rem; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
        button:hover { background:var(--accent-blue); color:white; border-color:var(--accent-blue); }
        button.active { background:var(--accent-blue); color:white; border-color:var(--accent-blue); }
        .main-content { padding:24px 32px; max-width:1800px; margin:0 auto; }
        .summary-bar { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
        .summary-chip { background:var(--bg-card); border:1px solid var(--border-color); border-radius:10px; padding:10px 18px; display:flex; align-items:center; gap:10px; flex:1; min-width:180px; }
        .summary-chip .icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
        .summary-chip .info .label { font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
        .summary-chip .info .value { font-size:1.1rem; font-weight:600; }
        .tab-nav { display:flex; gap:4px; margin-bottom:24px; background:var(--bg-secondary); padding:4px; border-radius:12px; border:1px solid var(--border-color); }
        .tab-btn { padding:10px 24px; border-radius:8px; border:none; background:transparent; color:var(--text-secondary); font-size:0.9rem; font-weight:500; cursor:pointer; transition:all 0.2s; flex:1; text-align:center; }
        .tab-btn:hover { color:var(--text-primary); background:var(--bg-card); }
        .tab-btn.active { background:var(--accent-blue); color:white; box-shadow:0 2px 8px rgba(30,144,255,0.3); }
        .panel-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:24px; }
        .panel { background:var(--bg-card); border:1px solid var(--border-color); border-radius:16px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,0.3); }
        .panel-header { padding:18px 20px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center; }
        .panel-header .pi-hole-info { display:flex; align-items:center; gap:12px; }
        .panel-header .status-dot { width:12px; height:12px; border-radius:50%; background:var(--accent-green); box-shadow:0 0 8px var(--accent-green); }
        .panel-header .status-dot.offline { background:var(--accent-red); box-shadow:0 0 8px var(--accent-red); }
        .panel-header .hostname { font-weight:600; font-size:0.95rem; }
        .panel-header .ip-address { font-size:0.75rem; color:var(--text-muted); }
        .panel-body { padding:20px; }
        .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:16px; }
        .stat-item { background:var(--bg-secondary); border-radius:10px; padding:14px; text-align:center; border:1px solid transparent; }
        .stat-item .stat-icon { font-size:18px; margin-bottom:4px; }
        .stat-item .stat-value { font-size:1.4rem; font-weight:700; }
        .stat-item .stat-label { font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; }
        .stat-value.green { color:var(--accent-green); }
        .stat-value.red { color:var(--accent-red); }
        .stat-value.orange { color:var(--accent-orange); }
        .stat-value.cyan { color:var(--accent-cyan); }
        .progress-container { margin:12px 0; }
        .progress-label { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:6px; }
        .progress-label .label { color:var(--text-secondary); }
        .progress-label .pct { font-weight:600; }
        .progress-bar { height:8px; background:var(--bg-primary); border-radius:4px; overflow:hidden; }
        .progress-fill { height:100%; border-radius:4px; transition:width 1s ease; }
        .progress-fill.red { background:linear-gradient(90deg,#ff4757,#ff6b81); }
        .progress-fill.green { background:linear-gradient(90deg,#3ddc84,#2ecc71); }
        .chart-container { position:relative; height:200px; margin-top:12px; }
        .top-list { margin-top:12px; }
        .top-list-title { font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
        .top-item { display:flex; align-items:center; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.03); gap:10px; }
        .top-item .rank { width:20px; height:20px; border-radius:4px; background:var(--bg-primary); display:flex; align-items:center; justify-content:center; font-size:0.65rem; color:var(--text-muted); flex-shrink:0; }
        .top-item .domain { flex:1; font-size:0.82rem; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .top-item .count { font-size:0.8rem; color:var(--text-muted); font-weight:500; flex-shrink:0; }
        .full-width-panel { background:var(--bg-card); border:1px solid var(--border-color); border-radius:16px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,0.3); margin-bottom:24px; }
        .full-width-panel .panel-header { cursor:pointer; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center; }
        .modal-overlay.active { display:flex; }
        .modal { background:var(--bg-card); border:1px solid var(--border-color); border-radius:20px; width:600px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
        .modal-header { padding:24px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center; }
        .modal-header h2 { font-size:1.2rem; }
        .modal-close { background:none; border:none; font-size:1.5rem; color:var(--text-muted); cursor:pointer; padding:4px 8px; }
        .modal-body { padding:24px; }
        .instance-config { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:12px; padding:20px; margin-bottom:16px; }
        .instance-config h3 { font-size:0.9rem; margin-bottom:12px; color:var(--accent-blue); }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-size:0.75rem; color:var(--text-muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
        .form-group input, .form-group select { width:100%; padding:10px 14px; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:8px; color:var(--text-primary); font-size:0.85rem; outline:none; transition:border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color:var(--accent-blue); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .modal-footer { padding:20px 24px; border-top:1px solid var(--border-color); display:flex; justify-content:flex-end; gap:10px; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .footer { text-align:center; padding:24px; color:var(--text-muted); font-size:0.75rem; border-top:1px solid var(--border-color); margin-top:32px; }
        .comparison-grid { display:grid; grid-template-columns:1fr; gap:12px; }
        .comparison-row { display:grid; grid-template-columns:200px 1fr 1fr 1fr; gap:12px; align-items:center; padding:12px 16px; background:var(--bg-secondary); border-radius:10px; border:1px solid transparent; }
        .comparison-row .comp-label { font-weight:600; font-size:0.85rem; }
        .comparison-row .comp-val { text-align:center; font-weight:600; font-size:0.9rem; }
        .fade-in { animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .query-types { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
        .query-type-item { background:var(--bg-secondary); border-radius:8px; padding:10px; text-align:center; }
        .query-type-item .qt-label { font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; }
        .query-type-item .qt-value { font-size:1rem; font-weight:700; }
        .disabled-notice { grid-column: 1 / -1; text-align:center; padding:40px; color:var(--text-muted); border:2px dashed var(--border-color); border-radius:16px; }
        ::-webkit-scrollbar { width:8px; }
        ::-webkit-scrollbar-track { background:var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background:var(--border-color); border-radius:4px; }
        @media(max-width:1200px) { .panel-grid{grid-template-columns:1fr;} .header{padding:12px 16px;} .main-content{padding:16px;} }
        @media(max-width:768px) { .stats-grid{grid-template-columns:repeat(2,1fr);} .summary-bar{flex-direction:column;} .header h1{font-size:1.1rem;} .header h1 span{display:none;} .comparison-row{grid-template-columns:1fr;} }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">🛡️</div>
            <h1>Pi-hole <span>Multi-Dashboard</span></h1>
        </div>
        <div class="header-controls">
            <div class="refresh-timer"><div class="dot" id="statusDot"></div><span id="lastUpdate">Never</span></div>
            <button onclick="toggleAutoRefresh()" id="autoRefreshBtn" class="active">⟳ Auto</button>
            <button onclick="refreshAll()">↻ Refresh</button>
            <button onclick="openSettings()">⚙️ Settings</button>
        </div>
    </header>

    <div class="main-content">
        <div class="summary-bar" id="summaryBar">
            <div class="summary-chip"><div class="icon" style="background:rgba(61,220,132,0.15);">🌐</div><div class="info"><div class="label">Total Queries</div><div class="value" id="totalQueries" style="color:var(--accent-green);">0</div></div></div>
            <div class="summary-chip"><div class="icon" style="background:rgba(255,71,87,0.15);">🚫</div><div class="info"><div class="label">Ads Blocked</div><div class="value" id="totalAds" style="color:var(--accent-red);">0</div></div></div>
            <div class="summary-chip"><div class="icon" style="background:rgba(30,144,255,0.15);">📊</div><div class="info"><div class="label">Block Rate</div><div class="value" id="totalBlockRate" style="color:var(--accent-blue);">0%</div></div></div>
            <div class="summary-chip"><div class="icon" style="background:rgba(168,85,247,0.15);">🏆</div><div class="info"><div class="label">Top Domains</div><div class="value" id="totalTopDomains" style="color:var(--accent-purple);">0</div></div></div>
            <div class="summary-chip"><div class="icon" style="background:rgba(0,210,211,0.15);">🔗</div><div class="info"><div class="label">Forwarded</div><div class="value" id="totalForwarded" style="color:var(--accent-cyan);">0</div></div></div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('overview', this)">📊 Overview</button>
            <button class="tab-btn" onclick="switchTab('queryTypes', this)">📋 Query Types</button>
            <button class="tab-btn" onclick="switchTab('topLists', this)">🏅 Top Lists</button>
            <button class="tab-btn" onclick="switchTab('comparison', this)">⚡ Comparison</button>
        </div>

        <div class="tab-content active" id="tab-overview"><div class="panel-grid" id="panelGrid"></div></div>
        <div class="tab-content" id="tab-queryTypes"><div class="panel-grid" id="queryTypesGrid"></div></div>
        <div class="tab-content" id="tab-topLists"><div class="panel-grid" id="topListsGrid"></div></div>
        <div class="tab-content" id="tab-comparison">
            <div class="full-width-panel">
                <div class="panel-header" onclick="toggleCollapse(this)"><div class="pi-hole-info"><span>📊</span><span class="hostname">Cross-Instance Comparison</span></div><span>▼</span></div>
                <div class="panel-body">
                    <div class="chart-container" style="height:300px;"><canvas id="comparisonChart"></canvas></div>
                    <div class="comparison-grid" id="comparisonGrid" style="margin-top:20px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">Pi-hole Multi-Dashboard &bull; Data refreshed every <span id="intervalDisplay">30</span>s &bull; <a href="#" onclick="openSettings(); return false;">Configure instances</a></div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header"><h2>⚙️ Configure Pi-hole Instances</h2><button class="modal-close" onclick="closeSettings()">×</button></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button type="button" onclick="closeSettings()">Cancel</button>
                <button type="button" onclick="saveSettings()" style="background:var(--accent-blue);color:white;border-color:var(--accent-blue);">💾 Save & Reload</button>
            </div>
        </div>
    </div>

    <script>
    let instances = [
        { name:"Pi-hole 1", protocol:"http", host:"", port:80, basePath:"", password:"", enabled:true, color:"#3ddc84", _auth:null, lastError:null },
        { name:"Pi-hole 2", protocol:"http", host:"", port:80, basePath:"", password:"", enabled:true, color:"#1e90ff", _auth:null, lastError:null },
        { name:"Pi-hole 3", protocol:"http", host:"", port:80, basePath:"", password:"", enabled:true, color:"#a855f7", _auth:null, lastError:null }
    ];
    let data = {}, autoRefresh = true, refreshInterval = 30, charts = {}, countdown = 30, refreshTimer = null, countdownTimer = null;

    document.addEventListener('DOMContentLoaded', () => {
        const REQUIRED = ['intervalDisplay','panelGrid','queryTypesGrid','topListsGrid','comparisonGrid','lastUpdate','autoRefreshBtn','settingsModal','modalBody','totalQueries','totalAds','totalBlockRate','totalTopDomains','totalForwarded'];
        const missing = REQUIRED.filter(id => !document.getElementById(id));
        if (missing.length > 0) {
            document.body.innerHTML = `<div style="padding:60px 20px;text-align:center;color:var(--accent-red);font-family:sans-serif;"><h1>Missing HTML Elements</h1><p>Ensure this exact structure is present and place this script at the end of <code>&lt;body&gt;</code>.</p></div>`;
            return;
        }
        loadConfig();
        renderSettingsModal();
        updateDashboard();
        startAutoRefresh();
    });

    function loadConfig() {
        try {
            const saved = localStorage.getItem('pihole_multi_config');
            if (saved) {
                const p = JSON.parse(saved);
                if (p.instances) p.instances.forEach((i,idx)=>{ if(idx<instances.length) { instances[idx]={...instances[idx],...i}; if(!instances[idx]._auth)instances[idx]._auth=null; } });
                if (p.refreshInterval) refreshInterval = p.refreshInterval;
            }
            while(instances.length<3) instances.push({ name:"Pi-hole "+(instances.length+1), protocol:"http", host:"", port:80, basePath:"", password:"", enabled:true, color:"#a855f7", _auth:null, lastError:null });
            const el = document.getElementById('intervalDisplay'); if(el) el.textContent = refreshInterval;
        } catch(e) { console.warn('Config load:', e); }
    }
    function saveConfig() {
        try {
            const clean = instances.map(i=>{ const c={...i}; delete c._auth; delete c.lastError; return c; });
            localStorage.setItem('pihole_multi_config', JSON.stringify({ instances:clean, refreshInterval }));
        } catch(e) { console.error('Config save:', e); }
    }

    function openSettings() { renderSettingsModal(); document.getElementById('settingsModal').classList.add('active'); }
    function closeSettings() { document.getElementById('settingsModal').classList.remove('active'); }

    function buildDisplayUrl(inst) {
        let url = inst.protocol + '://' + inst.host;
        if (inst.port && inst.port !== (inst.protocol === 'https' ? 443 : 80)) url += ':' + inst.port;
        url += inst.basePath || '';
        return url;
    }

    function renderSettingsModal() {
        let h='';
        for(let i=0;i<instances.length;i++){
            const inst=instances[i], def=inst.protocol==='https'?443:80, port=inst.port!==def?inst.port:'';
            h+=`<div class="instance-config"><h3>📡 Instance ${i+1}</h3><div class="form-row"><div class="form-group"><label>Name</label><input type="text" id="inst_name_${i}" value="${inst.name||''}" style="${!inst.enabled?'opacity:0.6':''}"></div><div class="form-group"><label>Enabled</label><select id="inst_enabled_${i}" style="width:100%;padding:10px 14px;background:${inst.enabled?'var(--bg-primary)':'var(--bg-card)'};border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:0.85rem;"><option value="true" ${inst.enabled?'selected':''}>Yes</option><option value="false" ${!inst.enabled?'selected':''}>No</option></select></div></div><div class="form-group"><label>API Endpoint/Path</label><input type="text" id="inst_addr_${i}" value="${buildDisplayUrl(inst)}" placeholder="e.g. /admin/ or /api/" style="width:100%;padding:10px 14px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:0.85rem;outline:none;"></div><div class="form-row"><div class="form-group"><label>Port (optional)</label><input type="number" id="inst_port_${i}" value="${port}" placeholder="${def}"></div><div class="form-group"><label>Web Password</label><input type="password" id="inst_password_${i}" value="${inst.password||''}" style="${!inst.enabled?'opacity:0.6':''}"></div></div></div>`;
        }
        h+=`<div class="instance-config"><h3>🔄 Global</h3><div class="form-row"><div class="form-group"><label>Refresh (s)</label><input type="number" id="refreshInterval" value="${refreshInterval}" min="5" max="300"></div></div></div>`;
        document.getElementById('modalBody').innerHTML = h;
    }

    function saveSettings() {
        try {
            for(let i=0;i<instances.length;i++){
                const n=document.getElementById('inst_name_'+i), e=document.getElementById('inst_enabled_'+i), a=document.getElementById('inst_addr_'+i), p=document.getElementById('inst_port_'+i), pw=document.getElementById('inst_password_'+i);
                if(!n||!e||!a||!p||!pw) throw new Error('Missing inputs');
                let raw=a.value.trim(), rawP=p.value.trim(), proto='http', host=raw, port=80, basePath='';
                try{
                    const u=new URL(raw.includes('://')?raw:'http://'+raw);
                    proto=u.protocol.replace(':',''); host=u.hostname; port=u.port?parseInt(u.port):(proto==='https'?443:80);
                    const path=u.pathname;
                    if(path && path!=='/') basePath=path;
                } catch{ host=raw.replace(/^https?:\/\//,'').split(':')[0]; if(raw.includes(':'))port=parseInt(raw.split(':')[1])||80; }
                if(rawP)port=parseInt(rawP)||port;
                if(!basePath || basePath==='/') basePath='/admin/';
                instances[i].name=n.value.trim()||('Pi-hole '+(i+1)); 
                instances[i].enabled=e.value==='true'; 
                instances[i].protocol=proto; instances[i].host=host; instances[i].port=port; 
                instances[i].basePath=basePath; instances[i].password=pw.value; 
                instances[i]._auth=null; instances[i].lastError=null;
            }
            const ri=document.getElementById('refreshInterval'); if(ri){refreshInterval=parseInt(ri.value)||30; document.getElementById('intervalDisplay').textContent=refreshInterval;}
            saveConfig(); closeSettings(); updateDashboard(); renderSettingsModal(); restartAutoRefresh();
        } catch(err){ console.error('Save error:',err); alert('Failed to save settings.'); }
    }

    function getApiUrl(inst) {
        let url = `${inst.protocol}://${inst.host}`;
        if (inst.port && inst.port !== (inst.protocol === 'https' ? 443 : 80)) url += ':' + inst.port;
        const path = inst.basePath || '/admin/';
        if (path === '/api/') return url + path;
        return url + path + 'api.php';
    }

    function buildEndpointUrl(inst, endpoint) {
        const base = getApiUrl(inst);
        const isV6 = base.endsWith('/api/');
        if (isV6) return `${base}${endpoint}${inst._auth.query}`;
        return `${base}?${endpoint}${inst._auth.query}`;
    }

    async function getPiHoleAuth(i) {
        if(i.password){
            if(i._auth && i._auth.expires>Date.now()) return i._auth.query;
            try{
                const authUrl = getApiUrl(i).replace(/\/$/, '') + '/auth';
                const r=await fetch(authUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:i.password})});
                if(r.ok){ const d=await r.json(); if(d.sid){i._auth={query:'?auth='+d.sid, expires:Date.now()+(d.validity*1000)}; return i._auth.query;} }
            } catch{}
            i._auth={query:'?auth='+encodeURIComponent(i.password), expires:0}; return i._auth.query;
        }
        return '?auth=';
    }

    async function fetchPiHoleData(i) {
        if(!i.enabled||!i.host) return null;
        const auth=await getPiHoleAuth(i);
        const endpoints = [
            { endpoint: 'summaryRaw', label: 'summary' },
            { endpoint: 'getQueryTypes', label: 'getQueryTypes' },
            { endpoint: 'topSources=10', label: 'topSources' },
            { endpoint: 'topAds=10', label: 'topAds' },
            { endpoint: 'topClients=10', label: 'topClients' },
            { endpoint: 'over_time_data', label: 'over_time_data' },
            { endpoint: 'get_forwarded_domains_count', label: 'getForwardedDomainsCount' },
            { endpoint: 'get_forwarded_domains', label: 'getForwardedDomains' }
        ];
        const urlList = endpoints.map(ep => buildEndpointUrl(i, ep.endpoint));
        try {
            const res = await Promise.all(urlList.map(u => fetch(u).then(r => r.ok ? r.json() : Promise.resolve(null)).catch(e => ({_err: e.message}))));
            if(res.some(r=>r&&r._err)) throw new Error(res.find(r=>r&&r._err)?._err||'API Error');
            return {summary:res[0]||{},queryTypes:res[1]||{},topSources:res[2]||{},topAds:res[3]||{},topClients:res[4]||{},overTimeData:res[5]||{},forwardedCount:res[6]||{},forwardedDomains:res[7]||{}};
        } catch(err){ i.lastError=err.message; return null; }
    }

    async function refreshAll(){
        try{
            const p=instances.map(i=>fetchPiHoleData(i).then(r=>{data[i.host]=r;return i;}));
            await Promise.all(p); updateDashboard();
            const el=document.getElementById('lastUpdate'); if(el)el.textContent='Updated '+new Date().toLocaleTimeString();
            countdown=refreshInterval;
        } catch(e){console.error('Refresh:',e);}
    }

    function updateDashboard(){ updateSummaryBar(); updateOverviewPanels(); updateQueryTypesTab(); updateTopListsTab(); updateComparisonTab(); }
    function updateSummaryBar(){
        const active=instances.filter(i=>i.enabled);
        let tQ=0,tA=0,tD=0,tF=0;
        active.forEach(i=>{ const d=data[i.host]; if(!d||!d.summary)return; tQ+=parseInt(d.summary.total_queries||0); tA+=parseInt(d.summary.ads_blocked_today||0); tD+=parseInt(d.summary.domains_being_blocked||0); tF+=parseInt(d.summary.forwarded_domains_count||0); });
        const set=(id,v)=>{ const e=document.getElementById(id); if(e)e.textContent=v; };
        set('totalQueries',fmt(tQ)); set('totalAds',fmt(tA)); set('totalBlockRate',tQ>0?(tA/tQ*100).toFixed(1)+'%':'0%'); set('totalTopDomains',fmt(tD)); set('totalForwarded',fmt(tF));
    }

    function updateOverviewPanels(){
        const g=document.getElementById('panelGrid'); if(!g)return;
        const active=instances.filter(i=>i.enabled);
        if(active.length===0){ g.innerHTML='<div class="disabled-notice">No instances are currently enabled. Go to ⚙️ Settings to activate one.</div>'; return; }
        g.innerHTML=active.map((i,idx)=>{
            const d=data[i.host], online=d&&d.summary&&d.summary.total_queries!==undefined;
            const tQ=parseInt(d?.summary?.total_queries||0), ads=parseInt(d?.summary?.ads_blocked_today||0), cache=parseInt(d?.summary?.cache_hits||0), doms=parseInt(d?.summary?.domains_being_blocked||0);
            const pct=tQ>0?(ads/tQ*100).toFixed(1):0; const displayUrl=buildDisplayUrl(i);
            return `<div class="panel fade-in"><div class="panel-header"><div class="pi-hole-info"><div class="status-dot ${online?'':'offline'}"></div><div><div class="hostname">${i.name}</div><div class="ip-address">${displayUrl}</div></div></div></div><div class="panel-body" id="panelBody-${idx}">${online?`<div class="stats-grid"><div class="stat-item"><div class="stat-icon">📈</div><div class="stat-value green">${fmt(tQ)}</div><div class="stat-label">Queries</div></div><div class="stat-item"><div class="stat-icon">🚫</div><div class="stat-value red">${fmt(ads)}</div><div class="stat-label">Blocked</div></div><div class="stat-item"><div class="stat-icon">🎯</div><div class="stat-value orange">${pct}%</div><div class="stat-label">Rate</div></div><div class="stat-item"><div class="stat-icon">⚡</div><div class="stat-value cyan">${fmt(cache)}</div><div class="stat-label">Cache</div></div></div><div class="progress-container"><div class="progress-label"><span class="label">Blocked</span><span class="pct" style="color:var(--accent-red)">${pct}%</span></div><div class="progress-bar"><div class="progress-fill red" style="width:${Math.min(pct,100)}%"></div></div></div><div class="progress-container"><div class="progress-label"><span class="label">Domains</span><span class="pct" style="color:var(--accent-green)">${fmt(doms)}</span></div><div class="progress-bar"><div class="progress-fill green" style="width:${Math.min(doms/200000*100,100)}%"></div></div></div><div class="chart-container"><canvas id="overviewChart-${idx}"></canvas></div>`:`<div style="text-align:center;padding:40px;"><div style="font-size:3rem">⚠️</div><div style="color:var(--accent-red);margin-top:8px;">${displayUrl}</div><div style="color:var(--accent-orange);font-size:0.8rem;margin-top:4px;">${i.lastError||'Check console for CORS/auth'}</div></div>`}</div></div>`;
        }).join('');
        active.forEach((i,idx)=>{ const d=data[i.host]; if(!d?.overTimeData?.over_time_data)return; const k=Object.keys(d.overTimeData.over_time_data).slice(-24); renderChart('overviewChart-'+idx,{type:'line',data:{labels:k,datasets:[{label:'Queries',data:k.map(k=>d.overTimeData.over_time_data[k]?.queries_total||0),borderColor:i.color,backgroundColor:i.color+'20',fill:true,tension:0.4,pointRadius:0,borderWidth:2},{label:'Blocked',data:k.map(k=>d.overTimeData.over_time_data[k]?.ads_total||0),borderColor:'#ff4757',backgroundColor:'#ff475720',fill:true,tension:0.4,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8899aa',font:{size:10},boxWidth:12}}},scales:{x:{ticks:{color:'#556677',font:{size:9},maxTicksLimit:6},grid:{color:'rgba(255,255,255,0.03)'}},y:{ticks:{color:'#556677',font:{size:9}},grid:{color:'rgba(255,255,255,0.05)'}}}}}); });
    }

    function updateQueryTypesTab(){
        const g=document.getElementById('queryTypesGrid'); if(!g)return;
        const active=instances.filter(i=>i.enabled);
        if(active.length===0){ g.innerHTML='<div class="disabled-notice">No instances enabled.</div>'; return; }
        g.innerHTML=active.map((i,idx)=>{ const d=data[i.host]; if(!d?.queryTypes?.querytypes)return `<div class="panel fade-in"><div class="panel-body" style="padding:30px;text-align:center;color:var(--text-muted)">No data</div></div>`; const qt=d.queryTypes.querytypes, total=Object.values(qt).reduce((a,b)=>a+parseInt(b||0),0);
        return `<div class="panel fade-in"><div class="panel-header"><div class="pi-hole-info"><div class="status-dot"></div><div><div class="hostname">${i.name}</div><div class="ip-address">Query Types</div></div></div></div><div class="panel-body"><div class="query-types">${Object.entries(qt).map(([t,c])=>`<div class="query-type-item"><div class="qt-label">${t}</div><div class="qt-value" style="color:${i.color}">${fmt(parseInt(c))}</div><div class="qt-label">${total>0?((parseInt(c)/total)*100).toFixed(1):0}%</div></div>`).join('')}</div><div class="chart-container" style="height:220px;margin-top:16px;"><canvas id="qtChart-${idx}"></canvas></div></div></div>`; }).join('');
        active.forEach((i,idx)=>{ const d=data[i.host]; if(!d?.queryTypes?.querytypes)return; renderChart('qtChart-'+idx,{type:'doughnut',data:{labels:Object.keys(d.queryTypes.querytypes),datasets:[{data:Object.values(d.queryTypes.querytypes).map(v=>parseInt(v)),backgroundColor:['#3ddc84','#1e90ff','#ff4757','#ffa502','#a855f7','#00d2d3'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:'#8899aa',font:{size:10},boxWidth:10,padding:8}}}}}); });
    }

    function updateTopListsTab(){
        const g=document.getElementById('topListsGrid'); if(!g)return;
        const active=instances.filter(i=>i.enabled);
        if(active.length===0){ g.innerHTML='<div class="disabled-notice">No instances enabled.</div>'; return; }
        g.innerHTML=active.map((i,idx)=>{ const d=data[i.host]; const ts=d?.topSources?.top_sources||[], ta=d?.topAds?.top_ads||[], tc=d?.topClients?.top_clients||[], fc=parseInt(Object.values(d?.forwardedCount||{})[0]||0);
        const list=(arr,t)=>`<div class="top-list" style="margin-top:${arr===ts?0:16}px"><div class="top-list-title">${t}</div>${arr.slice(0,5).map((it,j)=>`<div class="top-item"><div class="rank">${j+1}</div><div class="domain">${Object.keys(it)[0]}</div><div class="count">${fmt(Object.values(it)[0])}</div></div>`).join('')}</div>`;
        return `<div class="panel fade-in"><div class="panel-header"><div class="pi-hole-info"><div class="status-dot"></div><div><div class="hostname">${i.name}</div><div class="ip-address">Top Lists</div></div></div></div><div class="panel-body" style="padding:12px 20px;">${list(ts,'🌐 Sources')}${list(ta,'🚫 Blocked')}${list(tc,'💻 Clients')}<div style="margin-top:16px;padding:10px;background:var(--bg-secondary);border-radius:8px;font-size:0.8rem;color:var(--text-secondary)">Forwarded: <strong style="color:var(--accent-cyan)">${fmt(fc)}</strong></div></div></div>`; }).join('');
    }

    function updateComparisonTab(){
        const g=document.getElementById('comparisonGrid'); if(!g)return;
        const active=instances.filter(i=>i.enabled);
        if(active.length===0){ g.innerHTML='<div class="disabled-notice">No instances enabled.</div>'; return; }
        const metrics=[{l:'Queries',k:'total_queries'},{l:'Blocked',k:'ads_blocked_today'},{l:'Cache',k:'cache_hits'},{l:'Domains',k:'domains_being_blocked'},{l:'Forwarded',k:'forwarded_domains_count'}];
        g.innerHTML=metrics.map(m=>`<div class="comparison-row"><div class="comp-label">${m.l}</div>${active.map(i=>`<div class="comp-val" style="color:${i.color}">${fmt(parseInt(data[i.host]?.summary?.[m.k]||0))}</div>`).join('')}</div>`).join('');
        renderChart('comparisonChart',{type:'bar',data:{labels:active.map(i=>i.name),datasets:[{label:'Queries',data:active.map(i=>parseInt(data[i.host]?.summary?.total_queries||0)),backgroundColor:active.map(i=>i.color+'80'),borderColor:active.map(i=>i.color),borderWidth:2},{label:'Blocked',data:active.map(i=>parseInt(data[i.host]?.summary?.ads_blocked_today||0)),backgroundColor:['#ff475780','#ff6b8180','#ff8a8080'],borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8899aa',font:{size:11}}}},scales:{x:{ticks:{color:'#8899aa'},grid:{color:'rgba(255,255,255,0.03)'}},y:{ticks:{color:'#556677'},grid:{color:'rgba(255,255,255,0.05)'}}}}});
    }

    function renderChart(id,cfg){ try{ if(charts[id])charts[id].destroy(); const ctx=document.getElementById(id); if(!ctx)return; if(typeof Chart==='undefined'){ const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js'; s.onload=()=>updateDashboard(); document.head.appendChild(s); return; } charts[id]=new Chart(ctx,cfg); } catch(e){console.error('Chart error:',e);} }
    function fmt(n){ n=parseInt(n)||0; return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':n.toString(); }
    function switchTab(n,e){ document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+n).classList.add('active'); if(e)e.classList.add('active'); }
    function toggleAutoRefresh(){ autoRefresh=!autoRefresh; document.getElementById('autoRefreshBtn').classList.toggle('active',autoRefresh); autoRefresh?startAutoRefresh():clearInterval(refreshTimer); }
    function startAutoRefresh(){ clearInterval(refreshTimer); clearInterval(countdownTimer); countdown=refreshInterval; countdownTimer=setInterval(()=>{countdown--;const el=document.getElementById('lastUpdate'); if(el)el.textContent='Next: '+countdown+'s'; if(countdown<=0)refreshAll();},1000); refreshTimer=setInterval(()=>{if(autoRefresh)refreshAll();},refreshInterval*1000); }
    function restartAutoRefresh(){ clearInterval(refreshTimer); clearInterval(countdownTimer); startAutoRefresh(); }
    function toggleCollapse(h){ const p=h.closest('.full-width-panel'); p.classList.toggle('collapsed'); h.querySelector('span:last-child').textContent=p.classList.contains('collapsed')?'▶':'▼'; }
    document.getElementById('settingsModal').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeSettings(); });
    </script>
</body>
