<svg xmlns="http://www.w3.org/2000/svg" width="760" height="980" viewBox="0 0 760 980" role="img" aria-labelledby="title desc">
  <title id="title">Pi-hole Multi-Dashboard settings</title>
  <desc id="desc">Settings dialog showing three Pi-hole server records with encrypted stored passwords.</desc>
  <defs>
    <style>.bg{fill:#111516}.panel{fill:#182022;stroke:#314145}.input{fill:#0d1112;stroke:#314145}.text{fill:#edf4f2;font:600 18px system-ui}.muted{fill:#9aaba7;font:16px system-ui}.label{fill:#9aaba7;font:700 11px system-ui;letter-spacing:1px}.green{fill:#39d98a}.blue{fill:#4c9ffe}.violet{fill:#a78bfa}</style>
  </defs>
  <rect class="bg" width="760" height="980"/>
  <rect class="panel" x="0" y="0" width="760" height="66"/><text class="text" x="20" y="40" font-size="24">Settings</text><rect class="panel" x="666" y="14" width="66" height="36" rx="7"/><text class="text" x="681" y="38" font-size="16">Close</text>
  <rect class="green" x="20" y="86" width="116" height="36" rx="7"/><text x="34" y="110" fill="#06110d" font="700 16px system-ui">Add Server</text><rect class="panel" x="600" y="86" width="132" height="36" rx="7"/><text class="text" x="615" y="110" font-size="16">Reload Servers</text>
  <g transform="translate(20,136)">
    <rect class="panel" width="712" height="274" rx="7"/><text class="label" x="16" y="28">NAME</text><text class="label" x="372" y="28">URL</text><rect class="input" x="16" y="40" width="340" height="38" rx="7"/><text class="text" x="30" y="65" font-size="16">Primary Pi-hole</text><rect class="input" x="372" y="40" width="340" height="38" rx="7"/><text class="text" x="386" y="65" font-size="16">https://192.168.1.9</text><text class="label" x="16" y="110">PASSWORD OR TOKEN</text><text class="label" x="372" y="110">API VERSION</text><rect class="input" x="16" y="122" width="340" height="38" rx="7"/><text class="muted" x="30" y="147">Stored encrypted</text><rect class="input" x="372" y="122" width="340" height="38" rx="7"/><text class="text" x="386" y="147" font-size="16">v6</text><text class="label" x="16" y="192">COLOR</text><text class="label" x="372" y="192">ENABLED</text><rect class="input" x="16" y="204" width="340" height="38" rx="7"/><rect class="green" x="24" y="205" width="316" height="36"/><rect class="input" x="372" y="204" width="340" height="38" rx="7"/><text class="text" x="386" y="229" font-size="16">Yes</text><rect class="panel" x="626" y="250" width="86" height="36" rx="7"/><text class="text" x="644" y="274" font-size="16">Remove</text>
  </g>
  <g transform="translate(20,426)">
    <rect class="panel" width="712" height="274" rx="7"/><text class="label" x="16" y="28">NAME</text><text class="label" x="372" y="28">URL</text><rect class="input" x="16" y="40" width="340" height="38" rx="7"/><text class="text" x="30" y="65" font-size="16">Pi-hole 118</text><rect class="input" x="372" y="40" width="340" height="38" rx="7"/><text class="text" x="386" y="65" font-size="16">https://192.168.1.118</text><text class="label" x="16" y="110">PASSWORD OR TOKEN</text><text class="label" x="372" y="110">API VERSION</text><rect class="input" x="16" y="122" width="340" height="38" rx="7"/><text class="muted" x="30" y="147">Stored encrypted</text><rect class="input" x="372" y="122" width="340" height="38" rx="7"/><text class="text" x="386" y="147" font-size="16">Auto</text><text class="label" x="16" y="192">COLOR</text><text class="label" x="372" y="192">ENABLED</text><rect class="input" x="16" y="204" width="340" height="38" rx="7"/><rect class="blue" x="24" y="205" width="316" height="36"/><rect class="input" x="372" y="204" width="340" height="38" rx="7"/><text class="text" x="386" y="229" font-size="16">Yes</text><rect class="panel" x="626" y="250" width="86" height="36" rx="7"/><text class="text" x="644" y="274" font-size="16">Remove</text>
  </g>
  <g transform="translate(20,716)">
    <rect class="panel" width="712" height="204" rx="7"/><text class="label" x="16" y="28">NAME</text><text class="label" x="372" y="28">URL</text><rect class="input" x="16" y="40" width="340" height="38" rx="7"/><text class="text" x="30" y="65" font-size="16">Pi-hole 119</text><rect class="input" x="372" y="40" width="340" height="38" rx="7"/><text class="text" x="386" y="65" font-size="16">https://192.168.1.119</text><text class="label" x="16" y="110">PASSWORD OR TOKEN</text><text class="label" x="372" y="110">API VERSION</text><rect class="input" x="16" y="122" width="340" height="38" rx="7"/><text class="muted" x="30" y="147">Stored encrypted</text><rect class="input" x="372" y="122" width="340" height="38" rx="7"/><text class="text" x="386" y="147" font-size="16">Auto</text><rect class="violet" x="16" y="176" width="340" height="18"/>
  </g>
  <rect class="green" x="660" y="938" width="72" height="36" rx="7"/><text x="678" y="962" fill="#06110d" font="700 16px system-ui">Save</text>
</svg>
